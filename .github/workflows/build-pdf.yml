name: Build PDF

on:
  push:
    paths:
      - 'main.tex'
      - '.github/workflows/build-pdf.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Copy generated PDF
        run: cp main.pdf indicator13_checklist_review.pdf

      - name: Commit PDF to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add indicator13_checklist_review.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
          else
            git commit -m "Build Indicator 13 review PDF"
            git push
          fi

# Triggered from ChatGPT after local PDF verification.
